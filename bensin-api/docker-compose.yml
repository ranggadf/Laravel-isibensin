version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: laravel-app

    restart: unless-stopped

    working_dir: /var/www

    volumes:
      - .:/var/www

    expose:
      - "9000"

    networks:
      - proxy

  nginx:
    image: nginx:1.27-alpine

    container_name: laravel-nginx

    restart: unless-stopped

    depends_on:
      - app

    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    expose:
      - "80"

    networks:
      - proxy

networks:
  proxy:
    external: true